<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Goody — Never overpay again</title>
<meta name="theme-color" content="#0D1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Goody">
<meta name="description" content="Scan any price tag. Find the best deal instantly.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0D1117;
  --bg2:#111820;
  --bg3:#151C27;
  --card:rgba(255,255,255,0.05);
  --card2:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --ink:#F1F4F8;
  --ink2:rgba(241,244,248,0.70);
  --ink3:rgba(241,244,248,0.50);
  --ink4:rgba(241,244,248,0.35);
  --green:#27E08A;
  --green-l:rgba(39,224,138,0.10);
  --green-m:rgba(39,224,138,0.20);
  --red:#FF8888;
  --red-l:rgba(255,136,136,0.10);
  --amber:#FFB830;
  --amber-l:rgba(255,184,48,0.1);
  --r:16px;--r-sm:10px;--r-lg:22px;
  --ff:'Inter',system-ui,sans-serif;
  --dur:0.18s;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--ff);overflow:hidden;}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* STATUS BAR */
.status{display:flex;justify-content:space-between;align-items:center;padding:12px 22px 0;font-size:12px;font-weight:600;color:var(--ink3);flex-shrink:0;}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.page::-webkit-scrollbar{display:none;}
.page.on{display:flex;flex-direction:column;}

/* ── HOME ── */
.home-head{padding:20px 22px 0;display:flex;justify-content:space-between;align-items:center;}
.logo-mark{font-size:26px;font-weight:900;letter-spacing:-0.5px;}
.logo-mark span{color:var(--green);}
.logo-sub{font-size:11px;color:var(--ink3);font-weight:500;margin-top:1px;}
.notif-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}

.scan-hero{padding:28px 22px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.scan-hint{font-size:13px;color:var(--ink3);text-align:center;}
.scan-wrap{position:relative;width:152px;height:152px;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid var(--green);opacity:0;animation:pulse 2.4s ease-out infinite;}
.ring:nth-child(1){width:152px;height:152px;animation-delay:0s;}
.ring:nth-child(2){width:126px;height:126px;animation-delay:0.4s;}
.ring:nth-child(3){width:100px;height:100px;animation-delay:0.8s;}
@keyframes pulse{0%{opacity:0.6;transform:scale(0.85);}100%{opacity:0;transform:scale(1.08);}}
.scan-btn{width:88px;height:88px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform var(--dur),box-shadow var(--dur);position:relative;z-index:2;box-shadow:0 0 28px rgba(39,224,138,0.55),0 0 56px rgba(39,224,138,0.22);}
.scan-btn:active{transform:scale(0.91);}
.scan-btn svg{width:34px;height:34px;}
.scan-btn.scanning{animation:heartbeat 1.2s ease infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

.search-bar{margin:0 22px 20px;position:relative;}
.search-bar input{width:100%;height:50px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0 48px 0 18px;color:var(--ink);font-family:var(--ff);font-size:15px;outline:none;transition:border-color var(--dur),background var(--dur);}
.search-bar input::placeholder{color:var(--ink3);}
.search-bar input:focus{border-color:rgba(39,224,138,0.35);background:rgba(39,224,138,0.04);}
.search-go{position:absolute;right:0;top:0;height:50px;width:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink3);}

.sec-head{display:flex;justify-content:space-between;align-items:center;padding:0 22px;margin-bottom:12px;}
.sec-title{font-size:12px;font-weight:700;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase;}
.sec-action{font-size:12px;color:var(--green);font-weight:600;cursor:pointer;}

.cats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 22px;margin-bottom:24px;}
.cat{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:background var(--dur),border-color var(--dur);}
.cat:active{background:var(--green-l);border-color:var(--green);}
.cat-ic{font-size:20px;}
.cat-n{font-size:11px;font-weight:600;color:var(--ink2);text-align:center;}

.recent{padding:0 22px;display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.rec-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;cursor:pointer;transition:background var(--dur);}
.rec-item:active{background:var(--card2);}
.rec-left{display:flex;align-items:center;gap:12px;}
.rec-ico{width:38px;height:38px;border-radius:10px;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rec-name{font-size:14px;font-weight:600;}
.rec-meta{font-size:11px;color:var(--ink3);margin-top:2px;}
.rec-price{font-size:15px;font-weight:800;color:var(--green);}

/* ── CAMERA SHEET ── */
.cam-sheet{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.16,1,0.3,1);}
.cam-sheet.open{transform:translateY(0);}
.cam-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;flex-shrink:0;}
.cam-title{font-size:16px;font-weight:700;}
.cam-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;}
.cam-modes{display:flex;gap:8px;padding:0 20px 14px;flex-shrink:0;}
.cam-mode{flex:1;padding:10px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--card);font-family:var(--ff);font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;text-align:center;transition:all var(--dur);}
.cam-mode.on{border-color:var(--green);background:var(--green-l);color:var(--green);}
.vf-wrap{position:relative;width:100%;background:#000;display:none;flex-shrink:0;}
.vf-video{width:100%;max-height:260px;object-fit:cover;display:block;}
.vf-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.vf-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.vf-frame{position:relative;width:210px;height:130px;display:none;}
.vfc{position:absolute;width:22px;height:22px;border-color:var(--green);border-style:solid;}
.vfc.tl{top:0;left:0;border-width:2.5px 0 0 2.5px;border-radius:5px 0 0 0;}
.vfc.tr{top:0;right:0;border-width:2.5px 2.5px 0 0;border-radius:0 5px 0 0;}
.vfc.bl{bottom:0;left:0;border-width:0 0 2.5px 2.5px;border-radius:0 0 0 5px;}
.vfc.br{bottom:0;right:0;border-width:0 2.5px 2.5px 0;border-radius:0 0 5px 0;}
.vf-scanline{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scanLine 1.8s ease-in-out infinite;display:none;}
@keyframes scanLine{0%{top:4px;}50%{top:calc(100% - 4px);}100%{top:4px;}}
.cam-prev-wrap{padding:12px 20px;display:none;flex-shrink:0;}
.cprev{background:var(--card);border-radius:var(--r);padding:13px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);}
.cprev-img{width:52px;height:52px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;}
.cprev-ic{width:52px;height:52px;border-radius:var(--r-sm);background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.cprev-l{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
.cprev-v{font-size:14px;font-weight:700;color:var(--ink);}
.cprev-s{font-size:12px;color:var(--ink3);margin-top:2px;}
.cam-upload{display:flex;justify-content:center;padding:8px 20px;flex-shrink:0;}
.upload-btn{background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 20px;color:var(--ink3);font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;}
.cam-snap-wrap{padding:14px 20px 32px;flex-shrink:0;}
.snap-btn{width:100%;height:54px;border-radius:var(--r);background:var(--green);border:none;color:#121A24;font-family:var(--ff);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform var(--dur),background var(--dur);}
.snap-btn:active{transform:scale(0.97);}
.snap-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ── RESULTS ── */
.res-head{padding:16px 22px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.res-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.res-meta{font-size:11px;color:var(--ink3);margin-top:2px;}

.res-body{padding:0 22px;flex:1;}

.verdict-card{border-radius:var(--r-lg);padding:18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.verdict-card.buy{background:var(--green-l);border:1px solid var(--green-m);}
.verdict-card.wait{background:var(--amber-l);border:1px solid rgba(255,184,48,0.2);}
.verdict-card.skip{background:var(--red-l);border:1px solid rgba(255,136,136,0.2);}
.verdict-card.ok{background:var(--card2);border:1px solid var(--border2);}
.vc-tag{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.verdict-card.buy .vc-tag{color:var(--green);}
.verdict-card.wait .vc-tag{color:var(--amber);}
.verdict-card.skip .vc-tag{color:var(--red);}
.verdict-card.ok .vc-tag{color:var(--ink3);}
.vc-title{font-size:19px;font-weight:900;color:var(--ink);}
.vc-sub{font-size:12px;color:var(--ink3);margin-top:4px;line-height:1.4;}
.vc-score{border-radius:12px;padding:10px 14px;text-align:center;flex-shrink:0;}
.verdict-card.buy .vc-score{background:var(--green);}
.verdict-card.wait .vc-score{background:var(--amber);}
.verdict-card.skip .vc-score{background:var(--red);}
.verdict-card.ok .vc-score{background:var(--card2);}
.vc-score-n{font-size:24px;font-weight:900;line-height:1;color:#121A24;}
.verdict-card.ok .vc-score-n{color:var(--ink);}
.vc-score-l{font-size:10px;font-weight:700;color:#121A24;opacity:0.7;}
.verdict-card.ok .vc-score-l{color:var(--ink3);}

.savings-pill{background:var(--green-l);border:1px solid var(--green-m);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.sp-label{font-size:13px;color:var(--ink3);}
.sp-amount{font-size:24px;font-weight:900;color:var(--green);}

.price-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;transition:all var(--dur);cursor:pointer;position:relative;overflow:hidden;}
.p-card:active{transform:scale(0.98);}
.p-card.best{background:rgba(39,224,138,0.06);border-color:rgba(39,224,138,0.25);}
.p-card-shimmer{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(39,224,138,0.05),transparent);animation:sh 3.5s infinite;}
@keyframes sh{0%{left:-100%;}100%{left:200%;}}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pc-shop{display:flex;align-items:center;gap:10px;}
.pc-logo{width:34px;height:34px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.pc-name{font-size:14px;font-weight:700;}
.pc-delivery{font-size:11px;color:var(--ink3);margin-top:1px;}
.pc-price{font-size:26px;font-weight:900;}
.p-card.best .pc-price{color:var(--green);}
.pc-bot{display:flex;align-items:center;justify-content:space-between;}
.pc-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.b-green{background:var(--green-l);color:var(--green);}
.b-gray{background:var(--card2);color:var(--ink3);}
.b-amber{background:var(--amber-l);color:var(--amber);}
.pc-rating{display:flex;align-items:center;gap:3px;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.rdot.e{background:var(--border2);}
.rc{font-size:11px;color:var(--ink3);margin-left:3px;}
.buy-link{display:inline-flex;align-items:center;gap:5px;background:var(--green);color:#121A24;border:none;border-radius:10px;padding:8px 16px;font-family:var(--ff);font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;transition:transform var(--dur);}
.buy-link:active{transform:scale(0.94);}
.view-link{display:inline-flex;align-items:center;gap:5px;background:var(--card2);color:var(--ink2);border:none;border-radius:10px;padding:8px 16px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:transform var(--dur);}
.view-link:active{transform:scale(0.94);}

.no-results{text-align:center;padding:48px 24px;}
.nr-ico{font-size:48px;margin-bottom:16px;}
.nr-title{font-size:18px;font-weight:800;margin-bottom:8px;}
.nr-sub{font-size:14px;color:var(--ink3);line-height:1.5;}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px;}
.ldots{display:flex;gap:8px;}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:ldot 1.2s ease-in-out infinite;}
.ldot:nth-child(2){animation-delay:0.2s;}
.ldot:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,100%{opacity:0.3;transform:scale(0.7);}50%{opacity:1;transform:scale(1.1);}}
.loading-text{font-size:14px;color:var(--ink3);font-weight:500;}

/* ── SAVED ── */
.saved-head{padding:24px 22px 16px;}
.saved-title{font-size:24px;font-weight:900;}
.saved-sub{font-size:13px;color:var(--ink3);margin-top:4px;}
.saved-list{padding:0 22px;display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.saved-empty{text-align:center;padding:60px 24px;}
.se-ico{font-size:44px;margin-bottom:14px;}
.se-title{font-size:17px;font-weight:800;margin-bottom:6px;}
.se-sub{font-size:13px;color:var(--ink3);}

/* ── SETTINGS ── */
.set-head{padding:24px 22px 16px;}
.set-title{font-size:24px;font-weight:900;}
.set-section{padding:0 22px;margin-bottom:20px;}
.set-label{font-size:11px;font-weight:700;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase;margin-bottom:10px;}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.sr-n{font-size:14px;font-weight:600;}
.sr-v{font-size:13px;color:var(--ink3);}
.sr-a{font-size:16px;color:var(--ink3);}
.rate-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin:0 22px 20px;}
.rate-label{font-size:12px;color:var(--ink3);margin-bottom:8px;}
.rate-track{background:var(--border);border-radius:4px;height:6px;overflow:hidden;}
.rate-fill{height:100%;background:var(--green);border-radius:4px;transition:width 0.4s;}
.rate-text{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--ink3);}

/* ── NAV ── */
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:10px 0 max(20px,env(safe-area-inset-bottom));flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:0.38;transition:opacity var(--dur);background:none;border:none;color:var(--ink);}
.nav-btn.on{opacity:1;}
.nav-btn svg{width:22px;height:22px;}
.nav-lbl{font-size:10px;font-weight:700;font-family:var(--ff);}
.nav-btn.on .nav-lbl{color:var(--green);}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin-top:1px;display:none;}
.nav-btn.on .nav-dot{display:block;}


.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:200;}
.conf{position:absolute;width:8px;height:8px;border-radius:2px;animation:confFall linear forwards;}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;}}
.save-toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) scale(0.8);background:var(--green);color:#121A24;padding:12px 24px;border-radius:40px;font-size:15px;font-weight:800;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:150;}
.save-toast.on{opacity:1;transform:translateX(-50%) scale(1);}
.share-btn{display:inline-flex;align-items:center;gap:6px;background:var(--green-l);border:1px solid var(--green-m);border-radius:var(--r-sm);padding:8px 16px;font-family:var(--ff);font-size:13px;font-weight:700;color:var(--green);cursor:pointer;margin-top:10px;}
.translate-bar{display:flex;align-items:center;gap:8px;padding:10px 22px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;}
.translate-label{font-size:12px;color:var(--ink3);font-weight:600;}
.lang-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--ink2);font-family:var(--ff);font-size:12px;font-weight:700;cursor:pointer;transition:all var(--dur);}
.lang-btn.on{background:var(--green-l);border-color:var(--green);color:var(--green);}
.last-checked{font-size:11px;color:var(--ink3);text-align:center;padding:6px 0 2px;}



.goody-score-wrap{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;}
.goody-score-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.gsc-excellent{background:rgba(39,224,138,0.15);border:2px solid var(--green);}
.gsc-good{background:rgba(255,184,48,0.15);border:2px solid var(--amber);}
.gsc-poor{background:rgba(255,136,136,0.15);border:2px solid var(--red);}
.gsc-num{font-size:26px;font-weight:900;line-height:1;}
.gsc-label{font-size:9px;font-weight:700;letter-spacing:0.05em;opacity:0.7;}
.goody-score-info{}
.gsi-title{font-size:15px;font-weight:800;margin-bottom:3px;}
.gsi-sub{font-size:12px;color:var(--ink3);line-height:1.4;}
.price-dna{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:14px;}
.pdna-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pdna-title{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;}
.pdna-range{font-size:12px;color:var(--ink3);}
.pdna-graph{display:flex;align-items:flex-end;gap:3px;height:48px;}
.pdna-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.4s;}
.pdna-labels{display:flex;justify-content:space-between;margin-top:6px;}
.pdna-lbl{font-size:10px;color:var(--ink3);}
.pdna-current{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.pdna-curr-l{font-size:12px;color:var(--ink3);}
.pdna-curr-v{font-size:16px;font-weight:800;}
.ai-coach{background:linear-gradient(135deg,rgba(39,224,138,0.08),rgba(0,184,255,0.06));border:1px solid rgba(39,224,138,0.2);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:14px;}
.ac-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ac-icon{width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ac-title{font-size:12px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:0.06em;}
.ac-text{font-size:13px;color:var(--ink2);line-height:1.5;}

.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:var(--r-sm);}
@keyframes skel{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;}
.skel-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.skel-circle{width:34px;height:34px;border-radius:9px;flex-shrink:0;}
.skel-lines{flex:1;margin-left:10px;}
.skel-line{height:10px;margin-bottom:6px;border-radius:4px;}
.skel-price{width:70px;height:28px;border-radius:6px;}
.shop-status{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:6px;margin-top:4px;}
.shop-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.price-trend{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;}
.trend-up{background:var(--red-l);color:var(--red);}
.trend-down{background:var(--green-l);color:var(--green);}
.share-row{display:flex;justify-content:center;margin:8px 0 16px;}
.share-btn-main{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 20px;color:var(--ink2);font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;transition:all var(--dur);}
.share-btn-main:active{background:var(--green-l);border-color:var(--green);color:var(--green);}
.watch-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:var(--ff);font-size:12px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all var(--dur);}
.watch-btn.active{background:var(--amber-l);border-color:var(--amber);color:var(--amber);}


.goody-score-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.goody-score-circle{position:relative;width:72px;height:72px;flex-shrink:0;}
.score-svg{width:72px;height:72px;transform:rotate(-90deg);}
.score-bg{fill:none;stroke:var(--border2);stroke-width:6;}
.score-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-n{font-size:20px;font-weight:900;line-height:1;}
.score-lbl{font-size:9px;font-weight:700;opacity:0.6;letter-spacing:0.05em;}
.goody-score-info{flex:1;}
.gs-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.gs-sub{font-size:12px;color:var(--ink3);line-height:1.5;}
.gs-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.gs-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--card2);color:var(--ink3);}
.gs-pill.good{background:var(--green-l);color:var(--green);}
.gs-pill.warn{background:var(--amber-l);color:var(--amber);}

.price-dna{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:16px;}
.dna-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dna-title{font-size:12px;font-weight:700;color:var(--ink3);letter-spacing:0.06em;text-transform:uppercase;}
.dna-stats{display:flex;gap:16px;}
.dna-stat{text-align:center;}
.dna-stat-n{font-size:14px;font-weight:800;}
.dna-stat-l{font-size:10px;color:var(--ink3);}
.dna-chart{height:48px;position:relative;}
.dna-bar-wrap{display:flex;align-items:flex-end;gap:3px;height:100%;}
.dna-bar{flex:1;border-radius:3px 3px 0 0;background:var(--green-l);transition:height 0.6s ease;}
.dna-bar.current{background:var(--green);}
.dna-line{position:absolute;left:0;right:0;border-top:1px dashed rgba(255,184,48,0.4);}

.coach-card{background:linear-gradient(135deg,rgba(39,224,138,0.08),rgba(0,184,255,0.05));border:1px solid rgba(39,224,138,0.2);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:16px;}
.coach-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.coach-ico{width:32px;height:32px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.coach-title{font-size:13px;font-weight:800;color:var(--green);}
.coach-body{font-size:13px;color:var(--ink2);line-height:1.6;}

/* ── ERROR / TOAST ── */
.error-card{background:var(--red-l);border:1px solid rgba(255,136,136,0.2);border-radius:var(--r-lg);padding:18px;margin-bottom:16px;text-align:center;}
.error-ico{font-size:36px;margin-bottom:10px;}
.error-title{font-size:16px;font-weight:800;color:var(--red);margin-bottom:6px;}
.error-msg{font-size:13px;color:var(--ink3);line-height:1.5;}
.retry-btn{margin-top:14px;background:var(--red);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 24px;font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);color:var(--ink);padding:10px 20px;border-radius:40px;font-size:13px;font-weight:600;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.3s ease both;}

/* PULL TO REFRESH */
.ptr-indicator{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:300;display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:var(--green);box-shadow:0 4px 20px rgba(39,224,138,.4);opacity:0;transition:opacity .2s,top .2s;pointer-events:none;}
.ptr-indicator.visible{opacity:1;}
.ptr-arrow{font-size:18px;color:#121A24;transition:transform .3s;}
.ptr-arrow.ready{transform:rotate(180deg);}
@keyframes ptrSpin{to{transform:rotate(360deg);}}
.ptr-spinning{animation:ptrSpin .6s linear infinite;}

/* ── PHOTO PRICE COMPARISON IMPROVEMENTS ── */
.scan-compare-card{
  background:linear-gradient(135deg,rgba(39,224,138,0.13),rgba(39,224,138,0.04));
  border:1px solid rgba(39,224,138,0.28);
  border-radius:var(--r-lg);
  padding:18px;
  margin-bottom:16px;
}
.scan-compare-card.warn{
  background:linear-gradient(135deg,rgba(255,184,48,0.14),rgba(255,184,48,0.04));
  border-color:rgba(255,184,48,0.28);
}
.scan-compare-card.bad{
  background:linear-gradient(135deg,rgba(255,136,136,0.12),rgba(255,136,136,0.04));
  border-color:rgba(255,136,136,0.25);
}
.sc-kicker{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.sc-title{font-size:22px;font-weight:900;line-height:1.14;margin-bottom:8px;}
.sc-saving{font-size:34px;font-weight:900;color:var(--green);line-height:1;margin:8px 0 10px;}
.scan-compare-card.warn .sc-saving{color:var(--amber);}
.scan-compare-card.bad .sc-saving{color:var(--red);}
.sc-sub{font-size:13px;color:var(--ink2);line-height:1.45;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.sc-box{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:10px;}
.sc-box-l{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.sc-box-v{font-size:17px;font-weight:900;}
.sc-note{margin-top:12px;font-size:12px;color:var(--ink3);line-height:1.4;}
.photo-delta{font-size:11px;font-weight:800;padding:4px 9px;border-radius:20px;display:inline-flex;margin-top:7px;}
.photo-delta.good{background:var(--green-l);color:var(--green);}
.photo-delta.bad{background:var(--red-l);color:var(--red);}
.photo-delta.neutral{background:var(--card2);color:var(--ink3);}
.market-summary{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:16px;}
.ms-title{font-size:12px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.ms-row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;color:var(--ink2);}
.ms-row strong{color:var(--ink);}
.mini-score{display:flex;align-items:center;gap:8px;margin-top:12px;color:var(--ink3);font-size:12px;font-weight:700;}
.mini-score-pill{padding:4px 9px;border-radius:20px;background:var(--card2);color:var(--ink2);}


/* ── GOODY GOOD DEAL v5.9 — clearer photo vs internet comparison ── */
.deal-win-card{
  position:relative;overflow:hidden;
  background:radial-gradient(circle at 14% 0%,rgba(39,224,138,.24),transparent 34%),linear-gradient(135deg,rgba(39,224,138,.16),rgba(39,224,138,.045));
  border:1px solid rgba(39,224,138,.34);border-radius:26px;padding:20px;margin-bottom:16px;
  box-shadow:0 18px 48px rgba(0,0,0,.18);
}
.deal-win-card.warn{background:radial-gradient(circle at 14% 0%,rgba(255,184,48,.22),transparent 34%),linear-gradient(135deg,rgba(255,184,48,.15),rgba(255,184,48,.04));border-color:rgba(255,184,48,.34);}
.deal-win-card.bad{background:radial-gradient(circle at 14% 0%,rgba(255,136,136,.18),transparent 34%),linear-gradient(135deg,rgba(255,136,136,.12),rgba(255,136,136,.035));border-color:rgba(255,136,136,.28);}
.deal-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(39,224,138,.15);border:1px solid rgba(39,224,138,.28);color:var(--green);border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.deal-win-card.warn .deal-badge{background:rgba(255,184,48,.14);border-color:rgba(255,184,48,.28);color:var(--amber);}
.deal-win-card.bad .deal-badge{background:rgba(255,136,136,.12);border-color:rgba(255,136,136,.24);color:var(--red);}
.deal-title{font-size:25px;font-weight:950;letter-spacing:-.03em;line-height:1.08;margin-bottom:7px;}
.deal-hero{font-size:40px;font-weight:950;letter-spacing:-.045em;line-height:.98;color:var(--green);margin:10px 0 12px;text-shadow:0 0 24px rgba(39,224,138,.17);}
.deal-win-card.warn .deal-hero{color:var(--amber);text-shadow:0 0 20px rgba(255,184,48,.12);}
.deal-win-card.bad .deal-hero{color:var(--red);text-shadow:0 0 20px rgba(255,136,136,.12);}
.deal-sub{font-size:14px;color:var(--ink2);line-height:1.45;margin-bottom:14px;}
.deal-metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px;}
.deal-metric{background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px;}
.deal-metric-label{font-size:10px;color:var(--ink3);font-weight:900;text-transform:uppercase;letter-spacing:.075em;margin-bottom:5px;}
.deal-metric-value{font-size:19px;font-weight:950;letter-spacing:-.02em;}
.deal-proof{margin-top:13px;background:rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:11px 12px;font-size:12.5px;color:var(--ink2);line-height:1.42;}
.market-summary.win{background:linear-gradient(135deg,rgba(255,255,255,.065),rgba(255,255,255,.035));}
.price-list-label{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin:4px 0 10px;}

</style>
</head>
<body>
<div class="app">
  <div class="status">
    <span id="clk">--:--</span>
    <span id="rate-disp">●●● WiFi</span>
  </div>

  <!-- HOME -->
  <div class="page on" id="pg-home">
    <div class="home-head">
      <div>
        <div class="logo-mark">good<span>y</span></div>
        <div class="logo-sub">Never overpay again.</div>
      </div>
      <div class="notif-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 015 5v3l1.5 2.5H2.5L4 10V7a5 5 0 015-5z" stroke="currentColor" stroke-width="1.5"/><path d="M7 14.5a2 2 0 004 0" stroke="currentColor" stroke-width="1.5"/></svg>
      </div>
    </div>

    <div class="scan-hero">
      <div class="scan-hint">Point camera at any price tag</div>
      <div class="scan-wrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <button class="scan-btn" id="main-scan-btn" onclick="openCam('price')">
          <svg viewBox="0 0 36 36" fill="none">
            <path d="M5 11V8a3 3 0 013-3h3" stroke="#121A24" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M31 11V8a3 3 0 00-3-3h-3" stroke="#121A24" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M5 25v3a3 3 0 003 3h3" stroke="#121A24" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M31 25v3a3 3 0 01-3 3h-3" stroke="#121A24" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="10" y="10" width="16" height="16" rx="2.5" stroke="#121A24" stroke-width="2"/>
            <circle cx="18" cy="18" r="4" stroke="#121A24" stroke-width="2"/>
            <circle cx="18" cy="18" r="1.5" fill="#121A24"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="srch-inp" placeholder="Search any product..." autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
      <div class="search-go" onclick="doSearch()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M13 13l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>

    <div class="sec-head">
      <div class="sec-title">Categories</div>
    </div>
    <div class="cats" id="cats-grid"></div>

    <div class="sec-head" id="popular-head">
      <div class="sec-title">Popular</div>
    </div>
    <div class="recent" id="popular-list"></div>

    <div class="sec-head">
      <div class="sec-title">Paskutiniai skenai</div>
      <div class="sec-action" onclick="clearHistory()">Išvalyti</div>
    </div>
    <div class="recent" id="recent-list">
      <div style="padding:20px 0;text-align:center;color:var(--ink3);font-size:13px;">No recent searches</div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="page" id="pg-results">
    <div class="res-head">
      <button class="back-btn" onclick="navTo('home')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div style="min-width:0;">
        <div class="res-title" id="res-title">Results</div>
        <div class="res-meta" id="res-meta"></div>
      </div>
      <button style="width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" onclick="saveWishlist()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 15.5L3 9.5a3.5 3.5 0 015-4.9l1 1 1-1a3.5 3.5 0 015 4.9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="res-body" id="res-body"></div>
  </div>

  <!-- SAVED -->
  <div class="page" id="pg-saved">
    <div class="saved-head">
      <div class="saved-title">Saved</div>
      <div class="saved-sub" id="saved-count">0 items saved</div>
    </div>
    <div class="saved-list" id="saved-list"></div>
  </div>

  <!-- SETTINGS -->
  <div class="page" id="pg-settings">
    <div class="set-head">
      <div class="set-title">Settings</div>
    </div>
    <div class="rate-bar">
      <div class="rate-label">Daily searches used</div>
      <div class="rate-track"><div class="rate-fill" id="rate-fill" style="width:0%"></div></div>
      <div class="rate-text"><span id="rate-used">0 used</span><span id="rate-left">-- left</span></div>
    </div>
    <div class="set-section">
      <div class="set-label">App</div>
      <div class="set-card">
        <div class="set-row"><div class="sr-n">App</div><div class="sr-v">Goody</div></div>
        <div class="set-row"><div class="sr-n">Version</div><div class="sr-v">1.0</div></div>
        <div class="set-row"><div class="sr-n">Backend</div><div class="sr-v" id="be-url" style="font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div></div>
      </div>
    </div>
    <div class="set-section">
      <div class="set-label">Data</div>
      <div class="set-card">
        <div class="set-row" onclick="clearData()" style="cursor:pointer;"><div class="sr-n" style="color:var(--red);">Clear all data</div><div class="sr-a">›</div></div>
      </div>
    </div>
  </div>

  <!-- CAMERA SHEET -->
  <div class="cam-sheet" id="cam-sheet">
    <div class="cam-head">
      <div class="cam-title" id="cam-title">Scan price tag</div>
      <button class="cam-close" onclick="closeCam()">✕</button>
    </div>
    <div class="cam-modes">
      <button class="cam-mode on" id="cm-pr" onclick="switchCM('price')">📷 Price photo</button>
      <button class="cam-mode" id="cm-bc" onclick="switchCM('barcode')">▦ Barcode</button>
    </div>
    <div class="vf-wrap" id="vf-wrap">
      <video class="vf-video" id="vf-video" autoplay playsinline muted></video>
      <canvas class="vf-canvas" id="vf-canvas"></canvas>
      <div class="vf-overlay">
        <div class="vf-frame" id="vf-frame">
          <div class="vfc tl"></div><div class="vfc tr"></div>
          <div class="vfc bl"></div><div class="vfc br"></div>
          <div class="vf-scanline" id="vf-sl"></div>
        </div>
      </div>
    </div>
    <div class="cam-prev-wrap" id="cp-wrap">
      <div class="cprev" id="cprev"></div>
    </div>
    <div class="cam-upload">
      <button class="upload-btn" onclick="document.getElementById('fu').click()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 11V3M5 6l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Upload photo
      </button>
    </div>
    <div class="cam-snap-wrap">
      <button class="snap-btn" id="c-snap" onclick="snapOrSearch()">
        <span>📷</span><span>Enable camera</span>
      </button>
    </div>
  </div>

  <input type="file" id="fu" accept="image/*" onchange="handleUpload(event)" style="display:none">
  <div class="toast" id="toast"></div>
  <div class="save-toast" id="save-toast"></div>
  <div class="confetti-wrap" id="confetti-wrap"></div>


  <div class="translate-bar">
    <span class="translate-label">Language:</span>
    <button class="lang-btn on" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lang-lt" onclick="setLang('lt')">LT</button>
    <button class="lang-btn" id="lang-de" onclick="setLang('de')">DE</button>
    <button class="lang-btn" id="lang-pl" onclick="setLang('pl')">PL</button>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn on" id="nav-home" onclick="navTo('home')">
      <svg viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 3l8 6.5V19a1 1 0 01-1 1H14v-5H8v5H4a1 1 0 01-1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span class="nav-lbl">Home</span>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-scan" onclick="openCam('price')">
      <svg viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M12 14h3M15 12v5M12 12h1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-lbl">Scan</span>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-saved" onclick="navTo('saved')">
      <svg viewBox="0 0 22 22" fill="none"><path d="M11 18.5L4 11.5a4 4 0 015.66-5.66L11 7l1.34-1.34A4 4 0 0118 11l-7 7.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span class="nav-lbl">Saved</span>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="navTo('settings')">
      <svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M11 2v2M11 18v2M2 11h2M18 11h2M4.22 4.22l1.42 1.42M16.36 16.36l1.42 1.42M4.22 17.78l1.42-1.42M16.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-lbl">Settings</span>
      <div class="nav-dot"></div>
    </button>
  </nav>
</div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
const API_BASE = "https://goody-backend.onrender.com";

const CATS = [
  {ic:"📱",n:"Telefonai",q:"iPhone 16 Pro"},
  {ic:"💻",n:"Nešiojami",q:"MacBook Air M3"},
  {ic:"📺",n:"Televizoriai",q:"Samsung QLED 65"},
  {ic:"🎧",n:"Garsas",q:"Sony WH-1000XM5"},
  {ic:"⌚",n:"Laikrodžiai",q:"Apple Watch Series 10"},
  {ic:"🎮",n:"Žaidimai",q:"PlayStation 5"},
  {ic:"📷",n:"Foto",q:"Sony A7 IV"},
  {ic:"🏠",n:"Buitis",q:"Dyson V15"},
];

let wl = JSON.parse(localStorage.getItem("gy_wl")||"[]");
let hist = JSON.parse(localStorage.getItem("gy_hist")||"[]");
let camMode="price", camStream=null, scanLoop=null, capturedB64=null;
let lastData=null, lastQ="";

/* ── BOOT ── */
window.addEventListener("DOMContentLoaded",()=>{
  setLang(curLang); buildCats(); buildPopular(); buildRecent(); buildSaved();
  document.getElementById("be-url").textContent=API_BASE;
  const tick=()=>{const d=new Date();document.getElementById("clk").textContent=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");};
  tick(); setInterval(tick,30000);
  fetchRate();
});

function buildCats(){
  const g=document.getElementById("cats-grid"); g.innerHTML="";
  CATS.forEach(c=>{
    const el=document.createElement("div"); el.className="cat";
    el.innerHTML=`<span class="cat-ic">${c.ic}</span><div class="cat-n">${c.n}</div>`;
    el.onclick=()=>{document.getElementById("srch-inp").value=c.q;doSearch();};
    g.appendChild(el);
  });
}

const POPULAR = [
  {ic:"📱", q:"iPhone 16 Pro", price:"from €1,199"},
  {ic:"💻", q:"MacBook Air M3", price:"from €1,299"},
  {ic:"🎧", q:"Sony WH-1000XM5", price:"from €279"},
  {ic:"🌀", q:"Dyson V15 Detect", price:"from €549"},
  {ic:"📺", q:"Samsung QLED 65", price:"from €799"},
  {ic:"🤖", q:"Xiaomi Robot Vacuum", price:"from €199"},
];

function buildPopular(){
  const g=document.getElementById("popular-list"); if(!g)return;
  g.innerHTML="";
  POPULAR.forEach(p=>{
    const el=document.createElement("div"); el.className="rec-item fade-up";
    el.innerHTML=`<div class="rec-left"><div class="rec-ico">${p.ic}</div><div><div class="rec-name">${p.q}</div><div class="rec-meta">🔥 Trending</div></div></div><div class="rec-price">${p.price}</div>`;
    el.onclick=()=>{document.getElementById("srch-inp").value=p.q;doSearch();};
    g.appendChild(el);
  });
}

function buildRecent(){
  const g=document.getElementById("recent-list"); g.innerHTML="";
  if(!hist.length){g.innerHTML='<div style="padding:16px 0;text-align:center;color:var(--ink3);font-size:13px;">Nėra paskutinių skenų</div>';return;}
  hist.slice(0,5).forEach(h=>{
    const el=document.createElement("div"); el.className="rec-item fade-up";
    el.innerHTML=`<div class="rec-left"><div class="rec-ico">${h.ic||"🔍"}</div><div><div class="rec-name">${h.q}</div><div class="rec-meta">${h.shops||0} shops · ${h.time||"recently"}</div></div></div><div class="rec-price">${h.price||""}</div>`;
    el.onclick=()=>{document.getElementById("srch-inp").value=h.q;doSearch();};
    g.appendChild(el);
  });
}

function buildSaved(){
  const g=document.getElementById("saved-list");
  document.getElementById("saved-count").textContent=wl.length+" item"+(wl.length!==1?"s":"")+" saved";
  if(!wl.length){g.innerHTML=`<div class="saved-empty"><div class="se-ico">🤍</div><div class="se-title">Nothing saved yet</div><div class="se-sub">Find a deal and tap ♥ to save it</div></div>`;return;}
  g.innerHTML="";
  wl.forEach((item,i)=>{
    const el=document.createElement("div"); el.className="rec-item fade-up";
    el.innerHTML=`<div class="rec-left"><div class="rec-ico">🛒</div><div><div class="rec-name">${item.q}</div><div class="rec-meta">Best: ${item.price||"—"}</div></div></div><button style="background:var(--red-l);border:1px solid rgba(255,136,136,0.2);border-radius:8px;padding:6px 12px;color:var(--red);font-family:var(--ff);font-size:12px;font-weight:700;cursor:pointer;" onclick="removeWl(${i})">Remove</button>`;
    el.onclick=(e)=>{if(e.target.tagName!=="BUTTON"){document.getElementById("srch-inp").value=item.q;doSearch();}};
    g.appendChild(el);
  });
}

function clearHistory(){hist=[];localStorage.setItem("gy_hist",JSON.stringify(hist));buildRecent();toast("History cleared");}
function clearData(){if(!confirm("Clear all data?"))return;localStorage.clear();location.reload();}
function saveWishlist(){if(!lastData||!lastQ){toast("Nothing to save");return;}const ex=wl.find(w=>w.q===lastQ);if(ex){toast("Already saved!");return;}wl.push({q:lastQ,price:lastData.price_min?"€"+lastData.price_min.toFixed(2):""});localStorage.setItem("gy_wl",JSON.stringify(wl));buildSaved();toast("💚 Saved!");}
function removeWl(i){wl.splice(i,1);localStorage.setItem("gy_wl",JSON.stringify(wl));buildSaved();}

/* ── NAV ── */
function navTo(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("pg-"+id).classList.add("on");
  const nb=document.getElementById("nav-"+id);
  if(nb)nb.classList.add("on");
  if(id==="saved")buildSaved();
}

/* ── SEARCH ── */
async function doSearch(){
  const q=document.getElementById("srch-inp").value.trim();
  if(!q){toast("Enter a product name");return;}
  lastQ=q;
  navTo("results");
  document.getElementById("res-title").textContent=q;
  document.getElementById("res-meta").textContent="Searching...";
  const loadTimer = showLoading();
  try{
    const _ctrl=new AbortController();const _tid=setTimeout(()=>_ctrl.abort(),90000);
    const r=await fetch(`${API_BASE}/api/search`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:q}),signal:_ctrl.signal});
    clearTimeout(_tid);
    clearInterval(loadTimer);
    if(!r.ok){const e=await r.json();throw new Error(e.message||"Server error");}
    const d=await r.json();
    lastData=d;
    addToHist(q,d);
    renderResults(d,q);
    if(d._rate)updateRateUI(d._rate);
  }catch(e){
    document.getElementById("res-body").innerHTML=`<div style="padding:22px;"><div class="error-card"><div class="error-ico">😞</div><div class="error-title">Server unreachable</div><div class="error-msg">Check backend: ${API_BASE}<br><br>Run: <code style="background:var(--card2);padding:2px 6px;border-radius:4px;font-size:12px;">python server.py</code></div><button class="retry-btn" onclick="doSearch()">Try again</button></div></div>`;
    document.getElementById("res-meta").textContent="Error";
  }
}

function addToHist(q,d){
  hist=hist.filter(h=>h.q!==q);
  const icons={"phone":"📱","iphone":"📱","samsung":"📱","tv":"📺","televisor":"📺","laptop":"💻","macbook":"💻","headphone":"🎧","sony":"🎧","dyson":"🌀","vacuum":"🌀"};
  let ic="🔍";
  const ql=q.toLowerCase();
  for(const[k,v]of Object.entries(icons)){if(ql.includes(k)){ic=v;break;}}
  const now=new Date();
  const timeStr=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
  hist.unshift({q,ic,shops:d.results?.length||0,time:timeStr,price:d.price_min?"€"+d.price_min.toFixed(2):""});
  hist=hist.slice(0,10);
  localStorage.setItem("gy_hist",JSON.stringify(hist));
  buildRecent();
}

function money(v){
  const n=Number(v||0);
  return "€"+n.toFixed(2);
}

function findScannedPrice(d,results){
  if(Number(d.store_price)>1)return Number(d.store_price);
  const scan=(results||[]).find(r=>r.source==="scan" || String(r.shop||"").toLowerCase().includes("scanned"));
  return scan&&Number(scan.price)>1?Number(scan.price):0;
}

function isScanResult(r){
  return r.source==="scan" || String(r.shop||"").toLowerCase().includes("scanned");
}

function renderResults(d,q){
  const results=d.results||[];
  const onlineResults=results.filter(r=>!isScanResult(r)&&Number(r.price)>0);
  const scannedPrice=findScannedPrice(d,results);
  const bestOnline=onlineResults.length?[...onlineResults].sort((a,b)=>a.price-b.price)[0]:null;
  const now=new Date();
  const timeStr=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
  const lang=curLang||"en";
  const isLt=lang==="lt";

  document.getElementById("res-title").textContent=d.product_name||q;
  document.getElementById("res-meta").textContent=results.length?results.length+" shops · checked "+timeStr:"No results";

  let html="";

  if(!results.length){
    html+=`<div class="no-results">
      <div class="nr-ico">🔍</div>
      <div class="nr-title">${isLt?"Nieko nerasta":"Nothing found"}</div>
      <div class="nr-sub">${isLt?"Nepavyko rasti kainų šiam produktui":"Could not find prices for this product"}: <strong>${q}</strong>.</div>
      <div style="text-align:left;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:16px 0;">
        <div style="font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Tips</div>
        <div style="font-size:13px;color:var(--ink2);padding:4px 0;display:flex;gap:8px;">💡 <span>${isLt?"Bandyk trumpesnį pavadinimą":"Try a shorter product name"}</span></div>
        <div style="font-size:13px;color:var(--ink2);padding:4px 0;display:flex;gap:8px;">🏷 <span>${isLt?"Naudok brandą + modelį":"Use brand + model"}</span></div>
      </div>
      <button onclick="navTo('home')" style="width:100%;padding:14px;background:var(--green);color:#121A24;border:none;border-radius:var(--r);font-family:var(--ff);font-size:15px;font-weight:800;cursor:pointer;">← ${isLt?"Ieškoti dar kartą":"Search again"}</button>
    </div>`;
    document.getElementById("res-body").innerHTML=html;
    return;
  }

  if(scannedPrice>1 && bestOnline){
    const diff=scannedPrice-bestOnline.price;
    const pct=scannedPrice>0?(diff/scannedPrice*100):0;
    let cardCls="";
    let badge="";
    let title="";
    let hero="";
    let sub="";
    let proof="";
    let bestColor="var(--green)";

    if(diff>20){
      badge="🔥 GOOD DEAL";
      title=isLt?"Internete rasta geresnė kaina":"Better price found online";
      hero=(isLt?"Sutaupoma ":"Save ")+money(diff);
      sub=isLt
        ?`${bestOnline.shop}: ${Math.abs(pct).toFixed(1)} % pigiau nei kaina nuotraukoje.`
        :`${bestOnline.shop}: ${Math.abs(pct).toFixed(1)}% cheaper than the photo price.`;
      proof=isLt
        ?`Kaina nuotraukoje: ${money(scannedPrice)}. Kaina internete: ${money(bestOnline.price)}. Prieš perkant dar patikrink pristatymą ir pardavėjo sąlygas.`
        :`Photo price: ${money(scannedPrice)}. Online price: ${money(bestOnline.price)}. Check delivery and seller terms before buying.`;
      setTimeout(()=>fireConfetti(diff.toFixed(2)),550);
    }else if(diff>5){
      badge="🟢 GOOD DEAL";
      title=isLt?"Internete šiek tiek pigiau":"Slightly cheaper online";
      hero=(isLt?"Sutaupoma ":"Save ")+money(diff);
      sub=isLt
        ?`${bestOnline.shop} yra pigiau nei kaina nuotraukoje.`
        :`${bestOnline.shop} is cheaper than the photo price.`;
      proof=isLt
        ?`Skirtumas nėra didelis, bet tai vis tiek geras dealas, jei pristatymas nekainuoja daug.`
        :`The gap is not huge, but it is still a good deal if delivery is low.`;
      setTimeout(()=>fireConfetti(diff.toFixed(2)),700);
    }else if(diff>=-5){
      cardCls="warn";
      badge="👌 FAIR DEAL";
      title=isLt?"Kainos beveik vienodos":"Almost the same price";
      hero=isLt?"Skirtumas mažas":"Small difference";
      sub=isLt
        ?"Kaina nuotraukoje ir geriausia internete rasta kaina beveik nesiskiria."
        :"The photo price and the best online price are almost the same.";
      proof=isLt
        ?"Sprendimą verta priimti pagal patogumą: pristatymą, garantiją, grąžinimą ir pirkimo greitį."
        :"Decide by convenience: delivery, warranty, returns and speed.";
      bestColor="var(--amber)";
    }else{
      cardCls="bad";
      badge="🛡️ GOOD DEAL";
      title=isLt?"Kaina nuotraukoje geresnė":"Photo price is better";
      hero=(isLt?"Internete +":"Online +")+money(Math.abs(diff));
      sub=isLt
        ?`Geriausias internetinis pasiūlymas yra brangesnis nei kaina nuotraukoje.`
        :`The best online offer is more expensive than the photo price.`;
      proof=isLt
        ?`Kaina nuotraukoje: ${money(scannedPrice)}. Kaina internete: ${money(bestOnline.price)}. Jei sąlygos geros, vietoje rasta kaina atrodo geresnė.`
        :`Photo price: ${money(scannedPrice)}. Online price: ${money(bestOnline.price)}. If store terms are good, the photo price looks better.`;
      bestColor="var(--red)";
    }

    html+=`<div class="deal-win-card ${cardCls} fade-up">
      <div class="deal-badge">${badge}</div>
      <div class="deal-title">${title}</div>
      <div class="deal-hero">${hero}</div>
      <div class="deal-sub">${sub}</div>
      <div class="deal-metric-grid">
        <div class="deal-metric">
          <div class="deal-metric-label">${isLt?"Kaina nuotraukoje":"Photo price"}</div>
          <div class="deal-metric-value">${money(scannedPrice)}</div>
        </div>
        <div class="deal-metric">
          <div class="deal-metric-label">${isLt?"Kaina internete":"Online price"}</div>
          <div class="deal-metric-value" style="color:${bestColor}">${money(bestOnline.price)}</div>
        </div>
      </div>
      <div class="deal-proof">${proof}</div>
    </div>`;
  }else{
    const score=d.deal_score||50;
    const label=score>=75?"🔥 GOOD DEAL":score>=50?"👌 FAIR DEAL":"⚠️ MAYBE WAIT";
    const title=score>=75?(isLt?"Rasta gera kaina":"Good price found"):score>=50?(isLt?"Kaina atrodo normali":"Price looks fair"):(isLt?"Kaina neatrodo ypatinga":"Price is not exceptional");
    const sub=d.verdict_reason||d.buy_recommendation||"";
    html+=`<div class="deal-win-card ${score>=75?"":score>=50?"warn":"bad"} fade-up">
      <div class="deal-badge">${label}</div>
      <div class="deal-title">${title}</div>
      <div class="deal-sub">${sub}</div>
      <div class="mini-score"><span class="mini-score-pill">Score ${score}/100</span><span>${onlineResults.length||results.length} ${isLt?"pasiūlymai":"offers"}</span></div>
    </div>`;
  }

  if(d.price_min&&d.price_max&&d.price_max>d.price_min){
    const spread=d.price_max-d.price_min;
    const pct=Math.round((spread/d.price_max)*100);
    html+=`<div class="market-summary win fade-up">
      <div class="ms-title">${isLt?"Ką radome":"What we found"}</div>
      <div class="ms-row"><span>${isLt?"Pigiausia kaina":"Lowest price"}</span><strong>${money(d.price_min)}</strong></div>
      <div class="ms-row"><span>${isLt?"Brangiausia kaina":"Highest price"}</span><strong>${money(d.price_max)}</strong></div>
      <div class="ms-row"><span>${isLt?"Kainų skirtumas":"Market gap"}</span><strong>${money(spread)} · ${pct}%</strong></div>
    </div>`;
  }

  html+=`<div class="price-list-label">${isLt?"Pasiūlymai":"Offers"}</div>`;
  html+='<div class="price-list">';

  results.forEach((r,i)=>{
    const best=r.is_cheapest||r.is_best_value;
    const scan=isScanResult(r);
    const link=r.affiliate_url||r.url||"";
    const hasLink=link.startsWith("http");
    const logo=getShopLogo(r.shop);
    let badges="";

    if(scan){
      badges+=`<span class="badge b-gray">${isLt?"Kaina nuotraukoje":"Photo price"}</span>`;
    }else{
      if(r.is_cheapest)badges+=`<span class="badge b-green">${isLt?"Geriausia internete":"Best online"}</span>`;
      if(r.is_best_value&&!r.is_cheapest)badges+=`<span class="badge b-green">GOOD DEAL</span>`;
      if(r.is_top_rated)badges+=`<span class="badge b-amber">${isLt?"Top reitingas":"Top rated"}</span>`;
    }

    let deltaHtml="";
    if(scannedPrice>1 && Number(r.price)>0){
      if(scan){
        deltaHtml=`<div class="photo-delta neutral">${isLt?"Kaina nuotraukoje":"Photo price"}</div>`;
      }else{
        const diff=scannedPrice-r.price;
        if(diff>1)deltaHtml=`<div class="photo-delta good">${money(diff)} ${isLt?"pigiau nei kaina nuotraukoje":"cheaper than photo price"}</div>`;
        else if(diff<-1)deltaHtml=`<div class="photo-delta bad">${money(Math.abs(diff))} ${isLt?"brangiau nei kaina nuotraukoje":"more than photo price"}</div>`;
        else deltaHtml=`<div class="photo-delta neutral">${isLt?"beveik kaip kaina nuotraukoje":"almost same as photo price"}</div>`;
      }
    }

    let rating="";
    if(r.rating>0){
      const dots=[1,2,3,4,5].map(n=>`<div class="rdot${n<=Math.round(r.rating)?"":' e'}"></div>`).join("");
      rating=`<div class="pc-rating">${dots}<span class="rc">${r.rating.toFixed(1)}${r.review_count>0?" · "+r.review_count.toLocaleString():""}</span></div>`;
    }

    const delivery=humanDelivery(r.delivery);
    const btnLabel=best&&!scan?(isLt?"Pirkti →":"Buy now →"):(isLt?"Peržiūrėti →":"View →");
    const btnClass=best&&!scan?"buy-link":"view-link";
    const btnHtml=hasLink
      ?`<a class="${btnClass}" href="${link}" target="_blank" rel="noopener">${btnLabel}</a>`
      :`<span style="font-size:12px;color:var(--ink3);padding:4px 8px;">${isLt?"Nėra nuorodos":"No link"}</span>`;

    html+=`<div class="p-card${best&&!scan?" best":""} fade-up" style="animation-delay:${i*0.06}s">
      ${best&&!scan?'<div class="p-card-shimmer"></div>':""}
      <div class="pc-top">
        <div class="pc-shop">
          <div class="pc-logo">${logo}</div>
          <div><div class="pc-name">${r.shop||"Shop"}</div><div class="pc-delivery">${delivery}</div>${deltaHtml}</div>
        </div>
        <div style="text-align:right;">
          <div class="pc-price">${r.price>0?money(r.price):"—"}</div>
          ${r.original_price?`<div style="font-size:10px;color:var(--ink3);">${r.original_price.toFixed(0)} ${r.original_currency}</div>`:""}
        </div>
      </div>
      <div class="pc-bot">
        <div class="pc-badges">${badges||rating}</div>
        ${btnHtml}
      </div>
    </div>`;
  });
  html+='</div>';

  if(d.ai_summary||d.buy_recommendation){
    const coachText=d.buy_recommendation||d.ai_summary||"";
    if(coachText){
      html+=`<div class="ai-coach fade-up">
        <div class="ac-head"><div class="ac-icon">🧠</div><div class="ac-title">AI Shopping Coach</div></div>
        <div class="ac-text">${coachText}</div>
        ${d.alternative?`<div style="margin-top:10px;padding:10px 12px;background:var(--card2);border-radius:var(--r-sm);font-size:12px;color:var(--ink3);">💡 Alternative: <span style="color:var(--ink);font-weight:700;">${d.alternative}</span></div>`:""}
      </div>`;
    }
  }

  if(results.length>0){
    const safeName=(d.product_name||q).replace(/'/g,"\\'");
    html+=`<div class="share-row fade-up">
      <button class="share-btn-main" onclick="shareResults('${safeName}','${d.price_min?money(d.price_min):''}')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 2l4 4-4 4M14 6H6a4 4 0 000 8h1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${isLt?"Dalintis":"Share deal"}
      </button>
      <button class="watch-btn" id="watch-btn-${(d.product_name||q).replace(/\s/g,'_')}" onclick="toggleWatch('${safeName}','${d.price_min||0}')" style="margin-left:8px;">
        🔔 ${isLt?"Stebėti kainą":"Watch price"}
      </button>
    </div>`;
  }

function getShopLogo(shop){
  const s=(shop||"").toLowerCase();
  if(s.includes("amazon"))return"🌍";
  if(s.includes("pigu"))return"🛒";
  if(s.includes("varle"))return"🏪";
  if(s.includes("senukai"))return"🏬";
  if(s.includes("topo"))return"🏢";
  if(s.includes("elesen"))return"⚡";
  if(s.includes("scan"))return"📷";
  return"🛍";
}

function humanDelivery(d){
  if(!d)return"";
  const dl=d.toLowerCase();
  if(dl.includes("tomorrow")||dl.includes("1-2"))return"Tomorrow";
  if(dl.includes("today")||dl.includes("šiandien"))return"Today";
  if(dl.includes("prime"))return"Prime · Tomorrow";
  if(dl.includes("fizin"))return"In store";
  return d;
}

function updateRateUI(d){

/* ── CAMERA ── */
function openCam(mode){
  camMode=mode; capturedB64=null;
  switchCM(mode);
  document.getElementById("cp-wrap").style.display="none";
  document.getElementById("vf-wrap").style.display="none";
  resetSnap();
  document.getElementById("cam-sheet").classList.add("open");
}
function closeCam(){document.getElementById("cam-sheet").classList.remove("open");stopCam();}
function stopCam(){
  clearInterval(scanLoop);scanLoop=null;
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  document.getElementById("vf-wrap").style.display="none";
  const fr=document.querySelector(".vf-frame");if(fr)fr.style.display="none";
}
function switchCM(mode){
  camMode=mode;
  document.getElementById("cm-bc").classList.toggle("on",mode==="barcode");
  document.getElementById("cm-pr").classList.toggle("on",mode==="price");
  document.getElementById("cam-title").textContent=mode==="barcode"?"Scan barcode":"Scan price tag";
  document.getElementById("vf-sl").style.display=mode==="barcode"?"block":"none";
  capturedB64=null;document.getElementById("cp-wrap").style.display="none";resetSnap();
}
function resetSnap(){
  const btn=document.getElementById("c-snap");btn.disabled=false;btn.style.background="var(--green)";
  btn.innerHTML=`<span>📷</span><span>${camStream?(camMode==="barcode"?"Scanning...":"Take photo"):"Enable camera"}</span>`;
  btn.onclick=()=>snapOrSearch();
}
async function snapOrSearch(){
  if(capturedB64){await runScan();return;}
  if(!camStream){await startCam();return;}
  if(camMode==="price")captureFrame();
}
async function startCam(){
  const btn=document.getElementById("c-snap");btn.disabled=true;
  btn.innerHTML="<span>⏳</span><span>Connecting...</span>";
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const v=document.getElementById("vf-video");v.srcObject=camStream;
    document.getElementById("vf-wrap").style.display="block";
    document.querySelector(".vf-frame").style.display="block";
    await new Promise(r=>v.onloadedmetadata=r);
    btn.disabled=false;
    if(camMode==="barcode"){btn.innerHTML="<span>▦</span><span>Scanning...</span>";btn.disabled=true;startBcLoop();}
    else btn.innerHTML="<span>📷</span><span>Take photo</span>";
  }catch(e){btn.disabled=false;resetSnap();toast("Camera: "+e.message);}
}
function startBcLoop(){
  if(typeof ZXing==="undefined"){setTimeout(startBcLoop,800);return;}
  const hints=new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.QR_CODE]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
  const reader=new ZXing.MultiFormatReader();reader.setHints(hints);
  const v=document.getElementById("vf-video"),c=document.getElementById("vf-canvas"),ctx=c.getContext("2d");
  scanLoop=setInterval(()=>{
    if(v.readyState!==v.HAVE_ENOUGH_DATA)return;
    c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0);
    try{
      const id=ctx.getImageData(0,0,c.width,c.height);
      const res=reader.decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(new ZXing.RGBLuminanceSource(id.data,c.width,c.height))));
      if(res)onBcFound(res.getText());
    }catch(e){}
  },200);
}
function onBcFound(code){
  clearInterval(scanLoop);scanLoop=null;stopCam();
  setPrevUI(null,"▦","Barcode found",code,"Searching...");
  const btn=document.getElementById("c-snap");btn.disabled=false;
  btn.style.background="var(--green)";btn.innerHTML="<span>🔍</span><span>Search →</span>";
  btn.onclick=()=>{closeCam();document.getElementById("srch-inp").value=code;doSearch();};
  setTimeout(()=>{closeCam();document.getElementById("srch-inp").value=code;doSearch();},600);
}
function captureFrame(){
  const v=document.getElementById("vf-video");const c=document.createElement("canvas");
  c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);
  setPrevImage(c.toDataURL("image/jpeg",.85).split(",")[1],"camera");stopCam();
}
function setPrevImage(b64,src){
  capturedB64=b64;
  setPrevUI("data:image/jpeg;base64,"+b64,null,src==="camera"?"Photo taken":"Photo uploaded","Ready to analyze","Tap Analyze →");
  const btn=document.getElementById("c-snap");btn.disabled=false;
  btn.style.background="var(--green)";btn.innerHTML="<span>🔍</span><span>Analyze with AI →</span>";
  btn.onclick=()=>snapOrSearch();
}
function setPrevUI(imgSrc,ic,lbl,val,sub){
  document.getElementById("cp-wrap").style.display="block";
  document.getElementById("cprev").innerHTML=imgSrc
    ?`<img class="cprev-img" src="${imgSrc}"><div><div class="cprev-l">${lbl}</div><div class="cprev-v">${val}</div><div class="cprev-s">${sub}</div></div>`
    :`<div class="cprev-ic">${ic}</div><div><div class="cprev-l">${lbl}</div><div class="cprev-v">${val}</div><div class="cprev-s">${sub}</div></div>`;
}
function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const b64=ev.target.result.split(",")[1];
    if(camStream)stopCam();
    if(camMode==="barcode")tryDecImg(ev.target.result,b64);
    else setPrevImage(b64,"upload");
  };
  reader.readAsDataURL(file);e.target.value="";
}
function tryDecImg(dataUrl,b64){
  if(typeof ZXing==="undefined"){setPrevImage(b64,"upload");return;}
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement("canvas");c.width=img.width;c.height=img.height;
    c.getContext("2d").drawImage(img,0,0);
    try{
      const id=c.getContext("2d").getImageData(0,0,c.width,c.height);
      const hints=new Map();hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
      const r=new ZXing.MultiFormatReader();r.setHints(hints);
      const res=r.decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(new ZXing.RGBLuminanceSource(id.data,c.width,c.height))));
      onBcFound(res.getText());
    }catch(e){setPrevImage(b64,"upload");}
  };img.src=dataUrl;
}
async function runScan(){
  const btn=document.getElementById("c-snap");btn.disabled=true;
  btn.innerHTML="<span>⏳</span><span>Analyzing...</span>";
  // 1. Uždaryti kamerą iš karto
  closeCam();
  // 2. Rodyti results puslapį su loading
  navTo("results");
  document.getElementById("res-title").textContent="Scanning photo...";
  document.getElementById("res-meta").textContent="AI identifying product";
  const scanShops=["Amazon.DE","Elesen.lt"];
  let scanIdx=0;
  const skels=[1,2,3].map(()=>`<div class="skel-card"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line skeleton" style="width:60%"></div><div class="skel-line skeleton" style="width:40%"></div></div><div class="skel-price skeleton"></div></div></div>`).join("");
  document.getElementById("res-body").innerHTML=`
    <div style="text-align:center;padding:24px 0 16px;">
      <div style="font-size:36px;margin-bottom:8px;">📷</div>
      <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;">Analizuojama nuotrauka</div>
      <div style="font-size:12px;color:var(--ink3);">AI atpažįsta produktą...</div>
    </div>
    <div class="shop-status" style="margin-bottom:16px;"><div class="shop-dot"></div><span id="scan-status-txt">🔍 Tikriname ${scanShops[0]}...</span></div>
    ${skels}`;
  const scanTimer=setInterval(()=>{
    scanIdx=(scanIdx+1)%scanShops.length;
    const el=document.getElementById("scan-status-txt");
    if(el)el.textContent="🔍 Tikriname "+scanShops[scanIdx]+"...";
  },1200);
  try{
    const _sc=new AbortController();const _st=setTimeout(()=>_sc.abort(),90000);
    const resp=await fetch(`${API_BASE}/api/scan-image`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image:capturedB64}),signal:_sc.signal});
    clearTimeout(_st);clearInterval(scanTimer);
    const data=await resp.json();
    // Jei produktas neatpažintas
    if(data.error==="product_not_recognized"||(!data.scanned_product&&!data.product_name&&!(data.results&&data.results.length))){
      document.getElementById("res-body").innerHTML=`
        <div class="no-results">
          <div class="nr-ico">❌</div>
          <div class="nr-title">Not recognized</div>
          <div class="nr-sub">Could not identify the product from your photo.</div>
          <div style="text-align:left;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:16px 0;">
            <div style="font-size:13px;color:var(--ink2);padding:4px 0;display:flex;gap:8px;">💡 <span>Make sure product name/label is clearly visible</span></div>
            <div style="font-size:13px;color:var(--ink2);padding:4px 0;display:flex;gap:8px;">🔆 <span>Try better lighting or a closer shot</span></div>
            <div style="font-size:13px;color:var(--ink2);padding:4px 0;display:flex;gap:8px;">✏️ <span>Or just type the product name below</span></div>
          </div>
          <button onclick="navTo('home')" style="width:100%;padding:14px;background:var(--green);color:#121A24;border:none;border-radius:var(--r);font-family:var(--ff);font-size:15px;font-weight:800;cursor:pointer;">← Try again</button>
        </div>`;
      document.getElementById("res-title").textContent="Not recognized";
      document.getElementById("res-meta").textContent="";
      return;
    }
    if(data.results&&data.results.length>0){
      const q=data.scanned_product||data.product_name||"product";
      document.getElementById("srch-inp").value=q;
      if(data.store_price)toast(`Store price: €${data.store_price}`);
      lastQ=q;lastData=data;
      addToHist(q,data);
      renderResults(data,q);
      navTo("results");
    } else {
      const q=data.scanned_product||data.barcode||data.product_name||data.context||"";
      if(!q){toast("Could not identify product — try another photo");return;}
      document.getElementById("srch-inp").value=q;
      if(data.price_visible)toast(`Price tag: €${data.price_visible}`);
      doSearch();
    }
  }catch(e){
    clearInterval(scanTimer);
    btn.disabled=false;btn.style.background="var(--green)";
    btn.innerHTML="<span>🔍</span><span>Analyze with AI →</span>";btn.onclick=()=>snapOrSearch();
    toast("Error: "+e.message);
  }
}

function toggleWatch(name, price){
  const key="gy_watch";
  let watches=JSON.parse(localStorage.getItem(key)||"[]");
  const id=name.replace(/\s/g,'_');
  const btn=document.getElementById("watch-btn-"+id);
  const exists=watches.find(w=>w.name===name);
  if(exists){
    watches=watches.filter(w=>w.name!==name);
    if(btn){btn.classList.remove("active");btn.textContent="🔔 Watch price";}
    toast("Removed from watchlist");
  } else {
    watches.push({name,price,added:new Date().toISOString()});
    if(btn){btn.classList.add("active");btn.innerHTML="✅ Watching";}
    toast("💚 Added to watchlist!");
  }
  localStorage.setItem(key,JSON.stringify(watches));
}

function initWatchBtn(name){
  const key="gy_watch";
  const watches=JSON.parse(localStorage.getItem(key)||"[]");
  const id=name.replace(/\s/g,'_');
  const btn=document.getElementById("watch-btn-"+id);
  if(btn&&watches.find(w=>w.name===name)){
    btn.classList.add("active");btn.innerHTML="✅ Watching";
  }
}

/* PULL TO REFRESH */
(function(){
  let startY=0,pulling=false,ind=null;
  const THRESHOLD=65;
  function getInd(){
    if(!ind){ind=document.createElement("div");ind.className="ptr-indicator";ind.innerHTML='<span class="ptr-arrow">↓</span>';document.querySelector(".app").appendChild(ind);}
    return ind;
  }
  document.addEventListener("touchstart",e=>{
    const pg=document.querySelector(".page.on");
    if(!pg||pg.scrollTop>0)return;
    startY=e.touches[0].clientY;pulling=true;
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy<10)return;
    const i=getInd();
    i.style.top=(dy*0.4-22)+"px";
    i.classList.toggle("visible",dy>20);
    i.querySelector(".ptr-arrow").classList.toggle("ready",dy>THRESHOLD);
    i.style.opacity=Math.min(dy/THRESHOLD,1);
  },{passive:true});
  document.addEventListener("touchend",e=>{
    if(!pulling)return;pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    const i=getInd();
    if(dy>THRESHOLD){
      i.innerHTML='<span class="ptr-arrow ptr-spinning">↻</span>';
      i.style.top="12px";i.style.opacity="1";
      const pg=document.querySelector(".page.on");
      const pgId=pg?pg.id:"";
      setTimeout(()=>{
        i.classList.remove("visible");i.style.top="-50px";i.style.opacity=0;
        if(pgId==="pg-results"&&lastQ){doSearch();}
        else if(pgId==="pg-saved"){buildSaved();}
        else{fetchRate();buildRecent();buildPopular();}
        toast("🔄 Refreshed!");
      },700);
    } else {
      i.classList.remove("visible");i.style.top="-50px";i.style.opacity=0;
    }
  },{passive:true});
})();
